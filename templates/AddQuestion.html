<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/static/css/Common.css">
        <link rel="stylesheet" href="/static/css/AddQuestion.css">
        <title>Add Question</title>
    </head>
    <body>
        <div class="page">
            <p class="page-title">Share with the community</p>
            <p class="page-sub">Ask a question, or post one with its answer.</p>

            <div class="forms-row">
                <div class="QuestionBox">
                    <p class="box-label">Ask a question</p>
                    <form action="/AskQuestion" method="POST">
                        <input type="text" name="Question" required placeholder="What do you want to know?" maxlength="100">
                        <div class="spacer"></div>
                        <button type="submit" class="submit-btn">Post question</button>
                    </form>
                </div>

                <div class="QuestionBox">
                    <p class="box-label">Question & answer</p>
                    <form action="/AddQuestion" method="POST">
                        <input type="text" name="Question" required placeholder="Write your question..." maxlength="50">
                        <textarea name="Answer" placeholder="Write your answer..." required maxlength="350"></textarea>
                        <button type="submit" class="submit-btn">Post both</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="MenuContainer">
            <a href="/Mainpage">Mainpage</a>
            <a href="/">Home</a>
        </div>
    </body>
</html>
